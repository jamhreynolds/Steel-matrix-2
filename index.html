<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Steel Matrix">
<meta name="theme-color" content="#F5A800">
<title>SBD Steel Matrix</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;600&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #F5A800;
  --yellow-dk: #C88600;
  --black: #0D0D0D;
  --surface: #141720;
  --surface2: #1A1F2C;
  --surface3: #1E2436;
  --border: #252C3A;
  --border2: #1A1F2A;
  --text: #E8ECF2;
  --muted: #7A8499;
  --green: #2ECC71;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html {
  height: 100%;
  /* iOS safe area support */
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

body {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--black);
  color: var(--text);
  font-family: 'Roboto', sans-serif;
  overflow: hidden;
  /* Prevent iOS bounce scroll on body */
  position: fixed;
  width: 100%;
}

/* ── App Bar ── */
.app-bar {
  background: var(--surface);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 2.5px solid var(--yellow);
  box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  z-index: 10;
  /* iOS status bar padding */
  padding-top: max(10px, env(safe-area-inset-top));
}

/* ══════════════════════════════════════
   STANLEY BLACK & DECKER STYLE LOGO
   ══════════════════════════════════════ */
.sbd-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.sbd-oval {
  background: var(--yellow);
  border-radius: 10px;
  padding: 5px 12px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  box-shadow: 0 2px 12px rgba(245,168,0,.45), inset 0 1px 0 rgba(255,255,255,.3);
  min-width: 54px;
}
.oval-top {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 20px;
  letter-spacing: 3.5px; color: #000;
  line-height: 1; text-transform: uppercase;
}
.oval-rule {
  width: 88%; height: 1.5px;
  background: #A07000; margin: 2px 0; border-radius: 1px;
}
.oval-bot {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 6.5px;
  letter-spacing: 2px; color: rgba(0,0,0,.6);
  text-transform: uppercase; line-height: 1; white-space: nowrap;
}

.title-stack { display: flex; flex-direction: column; gap: 2px; line-height: 1; }
.title-main {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 19px;
  letter-spacing: 2px; color: var(--text);
  text-transform: uppercase; line-height: 1;
}
.title-main em { color: var(--yellow); font-style: normal; }
.title-sub {
  font-size: 9px; font-weight: 500;
  letter-spacing: 2.5px; color: var(--muted);
  text-transform: uppercase;
}

.app-bar-spacer { flex: 1; }
.count-chip {
  background: rgba(245,168,0,.1);
  border: 1px solid rgba(245,168,0,.3);
  border-radius: 20px; padding: 4px 10px;
  font-family: 'Roboto Mono', monospace;
  font-size: 10px; font-weight: 600;
  color: var(--yellow); letter-spacing: .5px;
}

/* ── Offline Banner ── */
.offline-banner {
  display: none;
  background: #333;
  color: #aaa;
  text-align: center;
  font-size: 11px;
  padding: 4px;
  letter-spacing: 1px;
}
.offline-banner.show { display: block; }

/* ── Scroll Content ── */
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  background: var(--black);
}
.content::-webkit-scrollbar { display: none; }
.inner {
  padding: 14px 13px;
  padding-bottom: max(80px, calc(80px + env(safe-area-inset-bottom)));
}

/* ── Search Field ── */
.search-wrap { margin-bottom: 12px; }
.search-field {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  display: flex; align-items: center;
  gap: 10px; padding: 0 8px 0 14px;
  transition: border-color .2s, box-shadow .2s;
}
.search-field:focus-within {
  border-color: var(--yellow);
  box-shadow: 0 0 0 2px rgba(245,168,0,.12);
}
.search-ico { width: 18px; height: 18px; fill: var(--muted); flex-shrink: 0; }
.search-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: 'Roboto Mono', monospace; font-size: 16px;
  color: var(--text); padding: 14px 0;
  /* iOS: prevent zoom on focus with font-size: 16px */
}
.search-input::placeholder { color: var(--muted); font-size: 14px; font-family: 'Roboto', sans-serif; }
.clear-btn {
  width: 34px; height: 34px; background: var(--surface2);
  border: none; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s; flex-shrink: 0;
}
.clear-btn:active { background: var(--border); }
.clear-btn svg { width: 14px; height: 14px; fill: var(--muted); }

/* ── Filter Chips ── */
.filter-row {
  display: flex; gap: 7px; margin-bottom: 13px;
  overflow-x: auto; scrollbar-width: none; padding-bottom: 2px;
}
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: transparent; color: var(--muted);
  font-family: 'Roboto', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; white-space: nowrap; touch-action: manipulation;
  transition: all .15s; min-height: 36px;
}
.chip svg { width: 12px; height: 12px; fill: currentColor; opacity: .6; }
.chip.active {
  background: var(--yellow); border-color: var(--yellow);
  color: #000; font-weight: 700;
  box-shadow: 0 2px 10px rgba(245,168,0,.3);
}
.chip.active svg { opacity: 1; }

/* ── Results Meta ── */
.results-meta {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; min-height: 16px;
}
.results-label {
  font-family: 'Roboto Mono', monospace;
  font-size: 11px; color: var(--muted);
}
.results-label .hl { color: var(--yellow); font-weight: 700; }
.divider { flex: 1; height: 1px; background: var(--border2); }

/* ── Cards ── */
.results-list { display: flex; flex-direction: column; gap: 8px; }
.result-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 13px;
  display: grid; grid-template-columns: 1fr auto auto;
  gap: 10px; align-items: center;
  animation: cardIn .16s cubic-bezier(.34,1.56,.64,1) both;
  cursor: pointer;
  transition: background .1s, border-color .1s, transform .1s;
  box-shadow: 0 1px 4px rgba(0,0,0,.4);
}
.result-card:active {
  background: var(--surface3);
  border-color: var(--yellow);
  transform: scale(0.984);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.result-part {
  font-family: 'Roboto Mono', monospace;
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-bottom: 3px; line-height: 1.3;
}
.result-steel {
  font-family: 'Roboto Mono', monospace;
  font-size: 11px; color: var(--yellow); font-weight: 600;
  margin-bottom: 2px; cursor: pointer;
  display: flex; align-items: center; gap: 3px;
}
.result-steel svg { width: 10px; height: 10px; fill: var(--yellow); flex-shrink: 0; }
.result-qty { font-size: 10px; color: var(--muted); }
.result-qty span { color: var(--text); font-weight: 600; }

.location-badge {
  background: var(--yellow); color: #000;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 17px; letter-spacing: 1px;
  padding: 7px 11px; border-radius: 10px;
  white-space: nowrap; text-align: center; min-width: 68px;
  box-shadow: 0 2px 8px rgba(245,168,0,.3); line-height: 1.2;
}

.speak-btn {
  width: 36px; height: 36px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: 16px;
  transition: all .15s; flex-shrink: 0; touch-action: manipulation;
}
.speak-btn:active, .speak-btn.speaking {
  border-color: var(--green); background: rgba(46,204,113,.1);
}

mark {
  background: rgba(245,168,0,.2); color: var(--yellow);
  border-radius: 2px; padding: 0 1px;
}

/* ── Empty / No Results ── */
.empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty-icon {
  width: 64px; height: 64px; margin: 0 auto 16px;
  background: var(--surface2); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.empty-icon svg { width: 30px; height: 30px; fill: var(--muted); opacity: .45; }
.empty-state p { font-size: 13px; line-height: 1.7; }
.empty-hint {
  display: inline-block; margin-top: 10px;
  background: rgba(245,168,0,.1); border: 1px solid rgba(245,168,0,.25);
  border-radius: 6px; padding: 3px 12px;
  font-family: 'Roboto Mono', monospace; font-size: 12px; color: var(--yellow);
}
.no-results {
  text-align: center; padding: 40px 20px; color: var(--muted);
  font-family: 'Roboto Mono', monospace; font-size: 12px; line-height: 1.8;
}

/* ── Install Banner ── */
.install-banner {
  display: none;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  padding: 10px 14px;
  flex-shrink: 0;
  align-items: center;
  gap: 10px;
}
.install-banner.show { display: flex; }
.install-banner p { flex: 1; font-size: 12px; color: var(--muted); line-height: 1.4; }
.install-banner p strong { color: var(--text); }
.install-btn {
  background: var(--yellow); color: #000;
  border: none; border-radius: 8px;
  padding: 8px 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 14px; letter-spacing: 1px;
  cursor: pointer; flex-shrink: 0; touch-action: manipulation;
}
.dismiss-btn {
  background: none; border: none; color: var(--muted);
  font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0;
}
</style>
</head>

    <!-- Filter Chips -->

      </button>
      <button class="chip" onclick="setFilter('steel',this)">

      </button>
    </div>

    <!-- Results Meta -->
    <div class="results-meta">
      <div class="results-label" id="resultsInfo"></div>
      <div class="divider"></div>
    </div>

    <!-- Results -->
    <div class="results-list" id="resultsGrid"></div>

  </div>
</div>

<!-- Install Prompt Banner -->
<div class="install-banner" id="installBanner">
  <p><strong>Add to Home Screen</strong><br>Install for offline access in the warehouse</p>
  <button class="install-btn" id="installBtn">INSTALL</button>

</div>

// ── Offline detection ──
function updateOnlineStatus() {
  document.getElementById('offlineBanner').classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ── Install prompt (Android Chrome) ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
});
document.getElementById('dismissBtn').addEventListener('click', () => {
  document.getElementById('installBanner').classList.remove('show');
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
});

// ── Search logic ──
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const q = document.getElementById('searchInput').value;
  if (q) handleSearch(q); else showEmptyState();
}

function highlight(text, query) {
  if (!query || !text) return text || '';
  const e = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${e})`, 'gi'), '<mark>$1</mark>');
}

function norm(s) { return s ? s.toLowerCase().replace(/\b0+(\d)/g, '$1') : ''; }

function handleSearch(query) {
  const raw = query.trim().toLowerCase(), q = norm(raw);
  const grid = document.getElementById('resultsGrid');
  const info = document.getElementById('resultsInfo');
  if (!q) { grid.innerHTML = ''; info.textContent = ''; showEmptyState(); return; }

  const results = DATA.filter(r => {
    const p = norm(r.part), d = norm(r.steel), l = norm(r.location);
    if (currentFilter === 'part') return p.includes(q);
    if (currentFilter === 'steel') return d.includes(q);
    if (currentFilter === 'location') return l.includes(q);
    return p.includes(q) || d.includes(q) || l.includes(q);
  });

  grid.innerHTML = '';
  if (results.length === 0) {
    info.innerHTML = `No results for <span class="hl">"${query}"</span>`;
    grid.innerHTML = `<div class="no-results">🔍 No matching parts found.<br>Try a partial number or different field.</div>`;
    return;
  }

  info.innerHTML = `<span class="hl">${results.length}</span> result${results.length !== 1 ? 's' : ''} for "${query}"`;

  results.forEach((row, i) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.style.animationDelay = (i * 0.025) + 's';
    card.innerHTML = `
      <div>
        <div class="result-part">${highlight(row.part || '(no part #)', q)}</div>
        <div class="result-steel" data-dwg="${row.steel}">
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
          ${highlight(row.steel, q)}
        </div>
        ${row.qty ? `<div class="result-qty">QTY <span>${row.qty}</span></div>` : ''}
      </div>
      <div class="location-badge">${highlight(row.location, q)}</div>
      <button class="speak-btn">🔊</button>`;
    card.querySelector('.result-steel').addEventListener('click', e => {
      e.stopPropagation();
      navigator.clipboard.writeText(e.currentTarget.dataset.dwg).then(() => {
        const el = e.currentTarget, orig = el.innerHTML;
        el.innerHTML = '✅ Copied!';
        setTimeout(() => { el.innerHTML = orig; }, 1200);
      }).catch(() => {});
    });
    card.querySelector('.speak-btn').addEventListener('click', e => {
      e.stopPropagation(); speakResult(row, card.querySelector('.speak-btn'));
    });
    grid.appendChild(card);
  });
}

function speakResult(row, btn) {
  if (!window.speechSynthesis) { alert('Voice not supported.'); return; }
  window.speechSynthesis.cancel();
  const text = [
    row.part ? row.part + '.' : '',
    row.steel ? 'steel: ' + row.steel.split('').join(' ') + '.' : '',
    'Location: ' + row.location + '.',
    row.qty ? 'Quantity: ' + row.qty + '.' : ''
  ].filter(Boolean).join(' ');
  const u = new SpeechSynthesisUtterance(text); u.rate = 0.9;
  if (btn) { btn.classList.add('speaking'); u.onend = () => btn.classList.remove('speaking'); }
  window.speechSynthesis.speak(u);
}

function showEmptyState() {
  document.getElementById('resultsGrid').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><path d="M22 9V7h-2V5c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2v-2h-2V9h2zm-4 10H4V5h14v14z"/></svg>
      </div>
      <p>Search by part number, steel number,<br>or bay location</p>
      <div class="empty-hint">e.g. "M11 B-4"</div>
    </div>`;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('resultsInfo').textContent = '';
  showEmptyState();
}

showEmptyState();
