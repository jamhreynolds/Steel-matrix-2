<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Steel Locator — 37F-1190</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #141720;
    --border: #252a35;
    --accent: #f5a623;
    --accent2: #e8512a;
    --green: #2ecc71;
    --red: #e74c3c;
    --text: #e8ecf0;
    --muted: #6b7280;
    --card: #1a1f2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    /* Prevent zoom on input focus on iOS */
    font-size: 16px;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  .logo span { color: var(--text); }
  .doc-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 7px;
    border-radius: 4px;
  }
  .count-badge {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  /* Main */
  main { padding: 20px 16px 30px; max-width: 600px; margin: 0 auto; }

  /* Search bar */
  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px; /* prevent iOS zoom */
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); font-size: 14px; }
  .clear-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    touch-action: manipulation;
    min-width: 52px;
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    touch-action: manipulation;
    transition: all 0.15s;
    min-height: 38px;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  /* Results info */
  .results-info {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    min-height: 16px;
  }
  .results-info span { color: var(--accent); font-weight: 600; }

  /* Result cards */
  .results-grid { display: flex; flex-direction: column; gap: 8px; }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: center;
    animation: slideIn 0.18s ease;
    touch-action: manipulation;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .result-card:active { background: #1f2535; border-color: var(--accent); }

  .speak-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    touch-action: manipulation;
    transition: all 0.15s;
  }
  .speak-btn:active, .speak-btn.speaking {
    border-color: var(--green);
    background: rgba(46,204,113,0.1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-part {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.3;
  }
  .result-drawing {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 2px;
    letter-spacing: 0.5px;
  }
  .result-qty {
    font-size: 11px;
    color: var(--muted);
  }
  .result-qty span { color: var(--text); font-weight: 600; }

  .location-badge {
    background: var(--accent);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    padding: 8px 12px;
    border-radius: 8px;
    white-space: nowrap;
    text-align: center;
    min-width: 70px;
  }

  /* Tap hint on cards */
  .tap-hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    font-style: italic;
  }

  /* Highlight */
  mark {
    background: rgba(245, 166, 35, 0.25);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 52px; margin-bottom: 14px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* No results */
  .no-results {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.8;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--green);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    padding: 12px 28px;
    border-radius: 30px;
    transition: transform 0.3s ease;
    z-index: 200;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(46,204,113,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>

let currentFilter = 'all';

document.getElementById('totalCount').textContent = DATA.length + ' parts';

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const q = document.getElementById('searchInput').value;
  if (q) handleSearch(q);
}

function highlight(text, query) {
  if (!query || !text) return text || '';
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

// Normalize a string for search: lowercase and strip leading zeros from numeric segments
function normalizeForSearch(str) {
  if (!str) return '';
  return str.toLowerCase().replace(/\b0+(\d)/g, '$1');
}

function handleSearch(query) {
  const raw = query.trim().toLowerCase();
  const q = normalizeForSearch(raw);
  const grid = document.getElementById('resultsGrid');
  const info = document.getElementById('resultsInfo');

  if (!q) {
    grid.innerHTML = '';
    info.textContent = '';
    showEmptyState();
    return;
  }

  const results = DATA.filter(row => {
    const part = normalizeForSearch(row.part);
    const drawing = normalizeForSearch(row.drawing);
    const location = normalizeForSearch(row.location);
    if (currentFilter === 'part') return part.includes(q);
    if (currentFilter === 'drawing') return drawing.includes(q);
    if (currentFilter === 'location') return location.includes(q);
    return part.includes(q) || drawing.includes(q) || location.includes(q);
  });

  grid.innerHTML = '';

  if (results.length === 0) {
    info.innerHTML = `No results for <span>"${query}"</span>`;
    grid.innerHTML = `<div class="no-results">🔍 No matching parts found.<br>Try a partial number or different field.</div>`;
    return;
  }

  info.innerHTML = `<span>${results.length}</span> result${results.length !== 1 ? 's' : ''} for "${query}"`;

  results.forEach(row => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div>
        <div class="result-part">${highlight(row.part || '(no part #)', q)}</div>
        <div class="result-drawing" title="Click to copy drawing number" style="cursor:pointer;" data-dwg="${row.drawing}">📐 ${highlight(row.drawing, q)}</div>
        ${row.qty ? `<div class="result-qty">QTY: <span>${row.qty}</span></div>` : ''}
      </div>
      <div class="location-badge">${highlight(row.location, q)}</div>
      <button class="speak-btn" title="Read aloud">🔊</button>
    `;
    card.querySelector('.result-drawing').addEventListener('click', (e) => {
      e.stopPropagation();
      const dwg = e.currentTarget.dataset.dwg;
      navigator.clipboard.writeText(dwg).then(() => {
        const el = e.currentTarget;
        const orig = el.innerHTML;
        el.innerHTML = '✅ Copied!';
        setTimeout(() => { el.innerHTML = orig; }, 1200);
      }).catch(() => {});
    });
    card.querySelector('.speak-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      speakResult(row, card.querySelector('.speak-btn'));
    });
    grid.appendChild(card);
  });
}

function speakResult(row, btn) {
  if (!window.speechSynthesis) {
    alert('Voice not supported in this browser.');
    return;
  }
  window.speechSynthesis.cancel();
  const part = row.part ? row.part + '.' : '';
  const dwg = row.drawing ? 'Drawing: ' + row.drawing.split('').join(' ') + '.' : '';
  const loc = 'Location: ' + row.location + '.';
  const qty = row.qty ? 'Quantity: ' + row.qty + '.' : '';
  const text = [part, dwg, loc, qty].filter(Boolean).join(' ');
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.9;
  if (btn) {
    btn.classList.add('speaking');
    utterance.onend = () => btn.classList.remove('speaking');
  }
  window.speechSynthesis.speak(utterance);
}

function showEmptyState() {
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = `<div class="empty-state"><div class="icon">🔧</div><p>Search by part number, drawing number,<br>or location like <em style="color:var(--accent)">"M11 B-4"</em></p></div>`;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('resultsInfo').textContent = '';
  showEmptyState();
}

// Init
showEmptyState();
